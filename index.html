<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% if operation == "+" %}
{{num1 + num2}}
{% elif operation == "-" %}
{{ num1 - num2 }}
{% elif operation == "*" %}
{{num1 * num2 }}
{% elif operation == "^" %}
{{num1 ** num2}}
{% elif operation == ":" %}
    {%if num2=="0" %}
        Ошибка
    {% else %}
        {{num1/num2}}
    {% endif %}
{% endif %}
</body>
</html>
